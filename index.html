<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <div class="card">

            <!-- Image du haut -->
            <img src="illustration-hero.svg.svg" alt="illustration-hero" class="hero">

            <div class="content">
                <h1>Order Summary</h1>

                <p>
                    You can now listen to millions of songs, audiobooks,
                    and podcasts on any device anywhere you like!
                </p>

                <!-- Plan -->
                <div class="plan-box">
                    <div class="plan">
                        <img src="icon-music.svg.svg" alt="music icon">
                        <div>
                            <h2>Annual Plan</h2>
                            <span>$59.99/year</span>
                        </div>
                    </div>

                    <a href="#">Change</a>
                </div>

                <!-- Boutons -->
                <button class="btn">Proceed to Payment</button>
                <a href="#" class="cancel">Cancel Order</a>

            </div>
        </div>

    </main>

</body>
</html>
